<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA Camera Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #1a1a1a; color: #fff; text-align: center; }
        video { width: 100%; max-width: 640px; background: #000; border: 1px solid #333; }
        input { padding: 8px; margin: 5px; font-size: 14px; width: 90%; max-width: 400px; }
        button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; }
        #status { margin: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <h2>HA Camera Viewer</h2>
    <div>
        <input id="hlsUrl" placeholder="HLS URL" value="">
        <br>
        <button onclick="startPlay()">再生</button>
        <button onclick="stopPlay()">停止</button>
    </div>
    <div id="status">未接続</div>
    <video id="video" autoplay playsinline muted controls></video>

    <script>
        let hls = null;

        function startPlay() {
            const url = document.getElementById('hlsUrl').value;
            if (!url) return;

            const video = document.getElementById('video');
            document.getElementById('status').textContent = '接続中...';

            if (Hls.isSupported()) {
                hls = new Hls({ liveSyncDuration: 1, liveMaxLatencyDuration: 5 });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    document.getElementById('status').textContent = '再生中';
                    video.play();
                });
                hls.on(Hls.Events.ERROR, (e, data) => {
                    document.getElementById('status').textContent = 'エラー: ' + data.details;
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    document.getElementById('status').textContent = '再生中';
                    video.play();
                });
            }
        }

        function stopPlay() {
            if (hls) { hls.destroy(); hls = null; }
            document.getElementById('video').src = '';
            document.getElementById('status').textContent = '停止';
        }
    </script>
</body>
</html>
